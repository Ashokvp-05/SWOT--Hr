version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hr-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Ashok@005
      POSTGRES_DB: antigravity_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hr-backend
    restart: always
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=Ashok@005
      - DB_NAME=antigravity_db
      - DB_PORT=5432
      - DATABASE_URL=postgresql://postgres:Ashok@005@db:5432/antigravity_db?schema=public
      - JWT_SECRET=hr_system_secret_key_2026
      - PORT=4000
    depends_on:
      - db
    ports:
      - "4000:4000"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hr-frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
